<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0d0d1a"/>
  <!-- X shape: two thick diagonal bars -->
  <line x1="7" y1="7" x2="25" y2="25" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="25" y1="7" x2="7" y2="25" stroke="url(#g2)" stroke-width="4.5" stroke-linecap="round"/>
</svg>
